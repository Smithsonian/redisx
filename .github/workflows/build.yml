name: Build
permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'include/**'
      - 'Makefile'
      - '*.mk'
      - '.github/workflows/build.yml'

  pull_request:
    paths:
      - 'src/**'
      - 'include/**'
      - 'Makefile'
      - '*.mk'
      - '.github/workflows/build.yml'

jobs:

  build:
    name: Build library
    runs-on: ubuntu-latest

    env:
      CC: gcc
      CFLAGS: -Os -Wall -Werror
      WEXTRA: 1
      FORTIFY: 3
      XCHANGE: xchange
  
    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update -q -y
        sudo apt-get install -q -y libpopt-dev libreadline-dev libbsd-dev libssl-dev
    
    - name: Check out RedisX
      uses: actions/checkout@v6

    - name: Check out xchange
      uses: actions/checkout@v6
      with:
        repository: Sigmyne/xchange
        path: xchange

    - name: Build xchange dependency
      run: |
        make -C xchange shared
        make -C xchange static

    - name: Build static library
      run: make static

    - name: Build shared library
      run: make shared

    - name: Build tools
      run: make tools

  build-freebsd:
    runs-on: ubuntu-latest
    name: FreeBSD
    steps:
    - name: Check out RedisX
      uses: actions/checkout@v6

    - name: Check out xchange
      uses: actions/checkout@v6
      with:
        repository: Sigmyne/xchange
        path: xchange

    - name: Build on FreeBSD
      uses: vmactions/freebsd-vm@v1
      with:
        release: "14.0"
        prepare: |
          pkg install -y gmake
        run: |
          echo Building on FreeBSD $(uname -m)
          cd xchange
          gmake static
          gmake shared
          cd ..
          export XCHANGE="xchange"
          gmake static
          gmake shared
